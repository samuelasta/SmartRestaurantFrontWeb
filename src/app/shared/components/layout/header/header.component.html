<header class="header">
  <div class="header-content">
    <div class="header-brand">
      <h1>SmartRestaurante</h1>
    </div>
    <nav class="header-nav" *ngIf="isLoggedIn">
      <div class="user-info">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role" *ngIf="userRole">{{ getRoleDisplayName(userRole) }}</span>
      </div>
      <button class="logout-btn" (click)="logout()">
        <span class="logout-icon">🚪</span>
        Cerrar Sesión
      </button>
    </nav>
  </div>
</header>
