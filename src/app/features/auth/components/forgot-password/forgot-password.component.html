<div class="auth-container">
  <div class="auth-card">
    <h2>Recuperar Contraseña</h2>
    <p class="info-text">Ingresa tu correo para recibir un código de recuperación</p>
    
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
      <app-form-field label="Correo Electrónico" [required]="true">
        <input type="email" formControlName="email" placeholder="correo@ejemplo.com">
      </app-form-field>

      <app-button 
        type="submit" 
        variant="primary" 
        [disabled]="forgotPasswordForm.invalid"
        [loading]="loading">
        Enviar Código
      </app-button>
    </form>

    <div class="auth-links">
      <a routerLink="/auth/login">Volver al inicio de sesión</a>
    </div>
  </div>
</div>
