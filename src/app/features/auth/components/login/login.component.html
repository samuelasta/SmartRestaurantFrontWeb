<div class="auth-container">
  <div class="auth-card">
    <!-- Login Normal -->
    <div *ngIf="!requires2FA">
      <div class="auth-header">
        <h2>Iniciar Sesión</h2>
        <p class="subtitle">Bienvenido a SmartRestaurante</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <app-form-field 
          label="Correo Electrónico" 
          [required]="true"
          [error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched ? 'Correo inválido' : ''">
          <input 
            type="email" 
            formControlName="email" 
            placeholder="correo@ejemplo.com"
            autocomplete="email">
        </app-form-field>

        <app-form-field 
          label="Contraseña" 
          [required]="true"
          [error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched ? 'Contraseña requerida' : ''">
          <div class="password-input-wrapper">
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              formControlName="password" 
              placeholder="********"
              autocomplete="current-password">
            <button 
              type="button" 
              class="toggle-password" 
              (click)="togglePasswordVisibility()">
              {{ showPassword ? '👁️' : '👁️‍🗨️' }}
            </button>
          </div>
        </app-form-field>

        <app-button 
          type="submit" 
          variant="primary" 
          [disabled]="loginForm.invalid"
          [loading]="loading">
          Iniciar Sesión
        </app-button>
      </form>

      <div class="divider">
        <span>O continuar con</span>
      </div>

      <div class="social-login-buttons">
        <button 
          type="button" 
          class="social-btn google-btn" 
          (click)="loginWithGoogle()"
          [disabled]="loading">
          <span class="social-icon">G</span>
          Google
        </button>
        
        <button 
          type="button" 
          class="social-btn facebook-btn" 
          (click)="loginWithFacebook()"
          [disabled]="loading">
          <span class="social-icon">f</span>
          Facebook
        </button>
        
        <button 
          type="button" 
          class="social-btn github-btn" 
          (click)="loginWithGitHub()"
          [disabled]="loading">
          <span class="social-icon">⚡</span>
          GitHub
        </button>
      </div>

      <div class="auth-links">
        <a routerLink="/auth/forgot-password">¿Olvidaste tu contraseña?</a>
        <a routerLink="/auth/register">Crear cuenta</a>
      </div>
    </div>

    <!-- Verificación 2FA -->
    <div *ngIf="requires2FA">
      <div class="auth-header">
        <h2>Verificación en Dos Pasos</h2>
        <p class="subtitle">Ingresa el código enviado a {{ pendingEmail }}</p>
      </div>

      <form [formGroup]="twoFAForm" (ngSubmit)="onSubmit2FA()">
        <app-form-field 
          label="Código de Verificación" 
          [required]="true"
          [error]="twoFAForm.get('code')?.invalid && twoFAForm.get('code')?.touched ? 'Código inválido' : ''">
          <input 
            type="text" 
            formControlName="code" 
            placeholder="123456" 
            maxlength="6"
            autocomplete="one-time-code">
        </app-form-field>

        <div class="button-group">
          <app-button 
            type="button" 
            variant="secondary" 
            (clicked)="cancel2FA()">
            Cancelar
          </app-button>
          
          <app-button 
            type="submit" 
            variant="primary" 
            [disabled]="twoFAForm.invalid"
            [loading]="loading">
            Verificar
          </app-button>
        </div>
      </form>
    </div>
  </div>
</div>
