<div class="auth-container">
  <div class="auth-card">
    <h2>Restablecer Contraseña</h2>
    <p class="info-text">Ingresa el código recibido y tu nueva contraseña</p>
    
    <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
      <app-form-field label="Correo Electrónico" [required]="true">
        <input type="email" formControlName="email" placeholder="correo@ejemplo.com">
      </app-form-field>

      <app-form-field label="Código de Verificación" [required]="true">
        <input type="text" formControlName="otp" placeholder="123456" maxlength="6">
      </app-form-field>

      <app-form-field label="Nueva Contraseña" [required]="true">
        <input type="password" formControlName="newPassword" placeholder="********">
      </app-form-field>

      <app-form-field label="Confirmar Contraseña" [required]="true">
        <input type="password" formControlName="confirmPassword" placeholder="********">
      </app-form-field>

      <app-button 
        type="submit" 
        variant="primary" 
        [disabled]="resetPasswordForm.invalid"
        [loading]="loading">
        Restablecer Contraseña
      </app-button>
    </form>

    <div class="auth-links">
      <a routerLink="/auth/login">Volver al inicio de sesión</a>
    </div>
  </div>
</div>
