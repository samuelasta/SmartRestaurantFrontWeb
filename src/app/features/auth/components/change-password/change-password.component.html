<div class="auth-container">
  <div class="auth-card">
    <h2>Cambiar Contraseña</h2>
    
    <form [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()">
      <app-form-field label="Contraseña Actual" [required]="true">
        <input type="password" formControlName="currentPassword" placeholder="********">
      </app-form-field>

      <app-form-field label="Nueva Contraseña" [required]="true">
        <input type="password" formControlName="newPassword" placeholder="********">
      </app-form-field>

      <app-form-field label="Confirmar Nueva Contraseña" [required]="true">
        <input type="password" formControlName="confirmPassword" placeholder="********">
      </app-form-field>

      <div *ngIf="!otpRequested" class="otp-section">
        <p class="info-text">Para cambiar tu contraseña, primero debes solicitar un código de verificación</p>
        <app-button 
          type="button" 
          variant="secondary" 
          (clicked)="requestOtp()"
          [loading]="loading">
          Solicitar Código OTP
        </app-button>
      </div>

      <div *ngIf="otpRequested">
        <app-form-field label="Código OTP" [required]="true">
          <input type="text" formControlName="otp" placeholder="123456" maxlength="6">
        </app-form-field>

        <app-button 
          type="submit" 
          variant="primary" 
          [disabled]="changePasswordForm.invalid"
          [loading]="loading">
          Cambiar Contraseña
        </app-button>
      </div>
    </form>
  </div>
</div>
