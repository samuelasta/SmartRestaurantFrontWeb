<div class="inventory-list-container">
  <div class="header">
    <h1>Inventario</h1>
    <app-button variant="primary" (clicked)="navigateToNew()">
      Agregar Producto
    </app-button>
  </div>

  <div class="filters">
    <!-- Filtros aquí -->
  </div>

  <app-loading-spinner *ngIf="loading" size="large"></app-loading-spinner>

  <app-table 
    *ngIf="!loading"
    [columns]="columns" 
    [data]="inventoryItems"
    (rowClicked)="onRowClick($event)">
  </app-table>
</div>
