<div class="dashboard-container">
  <div class="dashboard-header">
    <h1>Bienvenido, {{ userName }}</h1>
    <p class="role-badge">{{ getRoleDisplayName(userRole) }}</p>
  </div>

  <div class="dashboard-subtitle">
    <h2>Selecciona una sección para comenzar</h2>
  </div>

  <div class="dashboard-grid">
    <div 
      *ngFor="let card of getVisibleCards()" 
      class="dashboard-card"
      [style.border-left-color]="card.color"
      (click)="navigateTo(card.route)">
      <div class="card-icon">{{ card.icon }}</div>
      <div class="card-content">
        <h3>{{ card.title }}</h3>
        <p>{{ card.description }}</p>
      </div>
      <div class="card-arrow">→</div>
    </div>
  </div>

  <div *ngIf="getVisibleCards().length === 0" class="no-access">
    <p>No tienes acceso a ninguna sección del sistema.</p>
    <p>Contacta al administrador para más información.</p>
  </div>
</div>
